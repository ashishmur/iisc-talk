<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Poll - Presenter View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  #live-poll {
    width: 100%;
    max-width: 1100px;
  }

  /* Presenter toolbar */
  .toolbar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  .toolbar button {
    padding: 8px 16px;
    background: #222;
    border: 1px solid #444;
    color: #aaa;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .toolbar button:hover {
    background: #333;
    color: #fff;
  }
  .toolbar .danger:hover {
    background: #5a2020;
    border-color: #f87171;
    color: #f87171;
  }
</style>
</head>
<body>

  <div id="live-poll"></div>

  <div class="toolbar">
    <button onclick="toggleFullscreen()">Fullscreen</button>
    <button class="danger" onclick="PollWidget.reset()">Reset Votes</button>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <!-- Poll system -->
  <script src="poll-config.js"></script>
  <script src="poll-widget.js"></script>

  <script>
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
